name: aastrosphere
description: "Aastrosphere — Numerology companion app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.3+1

  # UI
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  pinput: ^5.0.0

  url_launcher: ^6.2.6

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5

  # State
  flutter_riverpod: ^2.5.1

  # Utils
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  http: ^1.2.1
  cupertino_icons: ^1.0.6

  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.2
  path_provider: ^2.1.4
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#F5F0E8"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - shorebird.yaml